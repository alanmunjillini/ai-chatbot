version: "3.9"

services:
  api:
    build: .
    container_name: chat_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always

  redis:
    image: redis:7
    container_name: chat_redis
    restart: always