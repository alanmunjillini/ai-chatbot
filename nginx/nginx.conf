server {
    listen 80;
    root /usr/share/nginx/html;
    index chat.html;

    # 静态文件
    location / {
        try_files $uri $uri/ /chat.html;
    }

    # API 路由 - 精确匹配
    location = /chat    { proxy_pass http://chat_api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /history { proxy_pass http://chat_api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /metrics { proxy_pass http://chat_api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /health  { proxy_pass http://chat_api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /login  { proxy_pass http://chat_api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /reset  { proxy_pass http://chat_api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}